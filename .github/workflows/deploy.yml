name: Deploy Tema su Tophost

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Prelevo il codice dal repository
        uses: actions/checkout@v3

      - name: 🚀 Caricamento file via FTP (TLS Esplicito)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /httpdocs/wp-content/themes/tuo-tema/
          protocol: ftps
          port: 21
          security: loose
          # AGGIUNGI QUESTE RIGHE QUI SOTTO:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**